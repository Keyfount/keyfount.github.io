<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nothing to keep · ItsMyPassword</title>
    <meta
      name="description"
      content="A deterministic password manager. No vault. No sync. No cloud. Just an algorithm."
    />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <canvas id="dotgrid" aria-hidden="true"></canvas>

    <div class="corners" aria-hidden="true">
      <div class="tl"><span class="mark"></span><span>itsmypassword</span></div>
      <div class="tr"><span>v0.1 · ephemeral build</span><span class="mark"></span></div>
      <div class="bl"><span class="mark"></span><span>entropy · 256 bits</span></div>
      <div class="br">
        <span id="seen-count">000000 generated · 000000 kept</span>
        <span class="mark"></span>
      </div>
    </div>

    <main class="stage">
      <div class="keycap-wrap" id="keycapWrap">
        <div class="keycap-halo"></div>
        <div class="keycap" id="keycap">
          <span class="keycap-glyph" id="keycapGlyph">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="8.5" cy="12" r="3.5" />
              <path d="M12 12h9" />
              <path d="M17 12v3.2" />
              <path d="M20 12v2" />
            </svg>
          </span>
        </div>
      </div>

      <div class="headline-wrap">
        <h1 class="headline">Nothing to keep.</h1>
      </div>

      <div class="stream" id="stream" aria-hidden="true"></div>

      <div class="status">
        <span class="dot"></span>
        <span>regenerating · never stored</span>
      </div>

      <div class="cta">
        <span class="key">␣</span>
        <span>press space to summon one</span>
      </div>
    </main>

    <div class="cursor" id="cursor" aria-hidden="true"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
